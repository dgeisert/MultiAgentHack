<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loreweaver — Live Audiobook Feed</title>
<style>
  :root { --bg:#0a1014; --panel:#10212a; --teal:#2dd4bf; --salt:#e7f6f2; --muted:#7fa6a0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif;
         background:radial-gradient(1200px 600px at 70% -10%,#13313a,#0a1014); color:var(--salt); }
  header { padding:40px 24px 16px; max-width:880px; margin:0 auto; }
  h1 { margin:0; font-size:34px; letter-spacing:.5px; }
  .sub { color:var(--muted); margin-top:6px; }
  .tag { display:inline-block; font-size:12px; color:var(--teal); border:1px solid var(--teal);
         border-radius:999px; padding:3px 10px; margin-top:14px; }
  main { max-width:880px; margin:0 auto; padding:8px 24px 60px; }
  .ep { background:var(--panel); border:1px solid #1c3a44; border-radius:14px; padding:18px 20px;
        margin:14px 0; display:flex; gap:16px; align-items:center; }
  .ep img { width:84px; height:84px; border-radius:10px; object-fit:cover; background:#08303a; }
  .ep h3 { margin:0 0 4px; font-size:18px; }
  .ep p { margin:0; color:var(--muted); font-size:13px; line-height:1.5; }
  audio { width:100%; margin-top:10px; }
  .empty { color:var(--muted); text-align:center; padding:60px 0; }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:30px; }
  a { color:var(--teal); }
</style>
</head>
<body>
<header>
  <h1 id="title">Loreweaver</h1>
  <div class="sub" id="premise">An autonomously written, voiced, and published fantasy audiobook.</div>
  <span class="tag">● LIVE · agents publishing chapter by chapter</span>
</header>
<main id="episodes"><div class="empty">Loading feed…</div></main>
<footer>Feed: <a href="feed.xml">feed.xml</a> · Generated by autonomous agents (Gemini · ElevenLabs · Tavily)</footer>

<script>
async function load() {
  const main = document.getElementById('episodes');
  try {
    const res = await fetch('feed.xml?_=' + Date.now());
    const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
    const ch = xml.querySelector('channel');
    document.getElementById('title').textContent =
      ch.querySelector('title')?.textContent || 'Loreweaver';
    document.getElementById('premise').textContent =
      ch.querySelector('description')?.textContent || '';
    const items = [...xml.querySelectorAll('item')].reverse();
    if (!items.length) { main.innerHTML = '<div class="empty">No chapters yet.</div>'; return; }
    main.innerHTML = '';
    for (const it of items) {
      const title = it.querySelector('title')?.textContent || 'Chapter';
      const desc  = it.querySelector('description')?.textContent || '';
      const audio = it.querySelector('enclosure')?.getAttribute('url') || '';
      const img   = it.getElementsByTagName('itunes:image')[0]?.getAttribute('href') || '';
      const el = document.createElement('div');
      el.className = 'ep';
      el.innerHTML =
        (img ? `<img src="${img}" alt="">` : '<img alt="">') +
        `<div style="flex:1"><h3>${title}</h3><p>${desc.slice(0,180)}</p>` +
        (audio ? `<audio controls preload="none" src="${audio}"></audio>` : '') + `</div>`;
      main.appendChild(el);
    }
  } catch (e) {
    main.innerHTML = '<div class="empty">Run a chapter to populate the feed.</div>';
  }
}
load();
</script>
</body>
</html>
